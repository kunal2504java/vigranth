services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - unifyinbox

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.core.celery_app worker --loglevel=info --pool=solo
    networks:
      - unifyinbox

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A backend.core.celery_app beat --loglevel=info
    networks:
      - unifyinbox

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - unifyinbox

volumes:
  redis_data:

networks:
  unifyinbox:
    driver: bridge
